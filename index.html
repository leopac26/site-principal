<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="stylesheet" href="genesis/genesis.css">
  <link rel="stylesheet" href="hinos-da-harpa/cifra.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shekinah Kadoshi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(rgba(0, 0, 0, 0.007), rgba(0, 0, 0, 0.034));
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* Container principal que vai conter logo e textos */
    .main-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 200px); /* Altura total menos o espaço do menu */
      padding: 20px;
      margin-top: 50px;
    }

    /* Container para os dois lados e centro */
    .content-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1400px;
      gap: 40px;
      flex-wrap: wrap;
    }

    /* Lado esquerdo */
    .left-side {
      flex: 1;
      text-align: right;
      padding: 20px;
      min-width: 250px;
    }

    /* Centro - Logo */
    .center-logo {
      flex-shrink: 0;
      text-align: center;
      padding: 20px;
    }

    .center-logo img {
      max-width: 100%;
      height: auto;
      width: 400px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
    }

    .center-logo img:hover {
      transform: scale(1.02);
    }

    /* Lado direito */
    .right-side {
      flex: 1;
      text-align: left;
      padding: 20px;
      min-width: 250px;
    }

    /* Estilos dos cards de informação */
    .info-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 25px;
      margin: 15px 0;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease;
    }

    .info-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .info-card h2, .info-card h3 {
      text-align: center;
      margin: 0;
      border: none;
      background: transparent;
      width: 100%;
      box-shadow: none;
      padding: 10px;
    }

    .info-card h2 {
      font-size: 28px;
      color: #2c3e50;
      margin-bottom: 15px;
      border-bottom: 2px solid #3498db;
      display: inline-block;
      width: auto;
    }

    .info-card h3 {
      font-size: 20px;
      color: #34495e;
      line-height: 1.6;
    }

   
    /* Responsividade */
    @media (max-width: 1024px) {
      .content-wrapper {
        flex-direction: column;
        gap: 20px;
      }
      
      .left-side, .right-side {
        text-align: center;
        width: 100%;
      }
      
      .center-logo img {
        width: 300px;
      }
      
      .info-card h2 {
        font-size: 24px;
      }
      
      .info-card h3 {
        font-size: 18px;
      }
    }

    @media (max-width: 768px) {
      .menu-tabela {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      
      .menu-tabela td {
        padding: 5px 10px;
      }
      
      .center-logo img {
        width: 250px;
      }
      
      .info-card {
        padding: 15px;
      }
      
      .info-card h2 {
        font-size: 20px;
      }
      
      .info-card h3 {
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .center-logo img {
        width: 200px;
      }
      
      .info-card h2 {
        font-size: 18px;
      }
      
      .info-card h3 {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <h1 class="titulo-menu">Igreja Shekinah Ministério Kadosh</h1>

  <table class="menu-principal">
    <tr class="menu-tabela">
      <td><a href="louvores/index.html">Louvores</a></td>
      <td><a href="genesis/index.html">Bíblia Sagrada</a></td>
      <td><a href="corinhos/corinhos.html">Corinhos</a></td>
      <td><a href="teclado virtual/teclado.html">Teclado Virtual</a></td>
      <td><a href="hinos-da-harpa/index.html">Hinos</a></td>
      <td><a href="quiz-Biblico/quiz.html">Quiz</a></td>
      <td><a href="#">Playback</a></td>
     </tr>
   </table>

  <div class="main-container">
    <div class="content-wrapper">
      <!-- Lado Esquerdo -->
      <div class="left-side">
        <div class="info-card">
          <h2>🗓️ Dias de Cultos</h2>
          <h3>Das 19:30 Hrs<br><br>
          🟦 Quarta-feira<br><br>
          🟦 Terça-feira<br>
          🟦 Quinta-feira<br>
          🟦 Domingo</h3>
        </div>
      </div>

      <!-- Centro - Logo -->
      <div class="center-logo">
        <img src="logomarca.jpeg" alt="Logomarca Shekinah">
      </div>

      <!-- Lado Direito -->
      <div class="right-side">
        <div class="info-card">
          <h2>📍 Endereços</h2>
          <h3>
            <strong>Bairro São José</strong><br>
            Número 189<br><br>
            <strong>Antônio Cardoso, 245</strong><br>
            Manoel Alves de Queiroz
          </h3>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
